<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>OpenEnv - Complete Presentation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc;
    overflow-x: hidden;
  }
  /* Navigation */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(15,23,42,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(148,163,184,0.1);
    padding: 12px 32px; display: flex; align-items: center; gap: 16px;
  }
  .nav-title { font-size: 14px; font-weight: 700; color: #93c5fd; margin-right: auto; }
  .nav-btn {
    padding: 6px 16px; border-radius: 6px; border: 1px solid rgba(148,163,184,0.2);
    background: rgba(30,41,59,0.6); color: #cbd5e1; font-size: 13px;
    cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
  }
  .nav-btn:hover { border-color: #3b82f6; color: #93c5fd; }
  .nav-counter { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #64748b; min-width: 60px; text-align: center; }
  .nav-dots { display: flex; gap: 6px; }
  .nav-dot {
    width: 8px; height: 8px; border-radius: 50%; background: rgba(148,163,184,0.2);
    cursor: pointer; transition: all 0.2s;
  }
  .nav-dot.active { background: #3b82f6; transform: scale(1.3); }
  .nav-dot:hover { background: #60a5fa; }

  /* Slide container */
  .slides-container {
    padding-top: 52px; /* nav height */
  }
  .slide-frame {
    width: 1920px; height: 1080px; border: none;
    display: none; /* shown via JS */
  }
  .slide-frame.active { display: block; }

  /* Keyboard hint */
  .keyboard-hint {
    position: fixed; bottom: 20px; right: 32px; z-index: 1000;
    font-size: 12px; color: #475569; font-family: 'JetBrains Mono', monospace;
    background: rgba(15,23,42,0.8); padding: 8px 14px; border-radius: 6px;
    border: 1px solid rgba(148,163,184,0.1);
  }
  kbd {
    padding: 2px 6px; border-radius: 3px; background: rgba(148,163,184,0.15);
    border: 1px solid rgba(148,163,184,0.2); font-size: 11px; color: #94a3b8;
  }
</style>
</head>
<body>

<div class="nav">
  <span class="nav-title">OpenEnv Presentation</span>
  <div class="nav-dots" id="navDots"></div>
  <button class="nav-btn" onclick="prevSlide()">&#9664; Prev</button>
  <span class="nav-counter" id="counter">1 / 19</span>
  <button class="nav-btn" onclick="nextSlide()">Next &#9654;</button>
</div>

<div class="slides-container" id="slidesContainer"></div>

<div class="keyboard-hint">
  <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp; <kbd>F</kbd> fullscreen
</div>

<script>
const slideFiles = [
  '01-title.html',
  '02-what-is-openenv.html',
  '03-why-openenv.html',
  '04-rl-basics.html',
  '05-rl-training-loop.html',
  '06-architecture.html',
  '07-creating-server-env.html',
  '08-hackenv-server.html',
  '09-creating-client-env.html',
  '10-working-with-envs.html',
  '11-deployment.html',
  '12-scaling.html',
  '13-loading-envs.html',
  '13-rubric-system.html',
  '14-training-trl.html',
  '15-training-unsloth.html',
  '16-environments.html',
  '17-community.html',
  '18-thank-you.html'
];

let currentSlide = 0;
const container = document.getElementById('slidesContainer');
const counter = document.getElementById('counter');
const navDots = document.getElementById('navDots');

// Create iframes for each slide
slideFiles.forEach((file, i) => {
  const iframe = document.createElement('iframe');
  iframe.className = 'slide-frame' + (i === 0 ? ' active' : '');
  iframe.src = file;
  iframe.width = '1920';
  iframe.height = '1080';
  iframe.style.border = 'none';
  iframe.id = 'slide-' + i;
  container.appendChild(iframe);

  // Create nav dot
  const dot = document.createElement('span');
  dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => goToSlide(i);
  dot.title = 'Slide ' + (i + 1);
  navDots.appendChild(dot);
});

function goToSlide(n) {
  if (n < 0 || n >= slideFiles.length) return;
  document.getElementById('slide-' + currentSlide).classList.remove('active');
  navDots.children[currentSlide].classList.remove('active');
  currentSlide = n;
  document.getElementById('slide-' + currentSlide).classList.add('active');
  navDots.children[currentSlide].classList.add('active');
  counter.textContent = (currentSlide + 1) + ' / ' + slideFiles.length;
  window.scrollTo(0, 0);
}

function nextSlide() { goToSlide(currentSlide + 1); }
function prevSlide() { goToSlide(currentSlide - 1); }

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
  if (e.key === 'Home') { e.preventDefault(); goToSlide(0); }
  if (e.key === 'End') { e.preventDefault(); goToSlide(slideFiles.length - 1); }
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }
});
</script>

</body>
</html>
